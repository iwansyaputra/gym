<!DOCTYPE html>

<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - GymKu</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    overflow: hidden;
}

/* CONTAINER */
.login-container {
    position: relative;
    width: 100%;
    max-width: 380px;
}

/* CARD */
.login-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    z-index: 2;
    position: relative;
    animation: fadeIn 0.6s ease;
}

/* HEADER */
.login-header {
    text-align: center;
    margin-bottom: 1.5rem;
}

.logo-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.logo-icon {
    width: 28px;
    height: 28px;
}

.login-subtitle {
    font-size: 0.85rem;
    opacity: 0.7;
}

/* FORM */
.form-group {
    margin-bottom: 1rem;
}

label {
    font-size: 0.8rem;
    opacity: 0.8;
}

.input-wrapper {
    position: relative;
    margin-top: 6px;
}

.input-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    opacity: 0.6;
}

input {
    width: 100%;
    padding: 10px 10px 10px 35px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: #fff;
}

input::placeholder {
    color: #ccc;
}

/* TOGGLE */
.toggle-password {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
}

/* OPTIONS */
.form-options {
    margin-bottom: 1rem;
    font-size: 0.8rem;
}

/* BUTTON */
.btn-primary {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #6366f1;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    position: relative;
}

.btn-primary:hover {
    background: #4f46e5;
}

.btn-primary.loading {
    pointer-events: none;
    opacity: 0.7;
}

/* LOADER */
.btn-loader {
    display: none;
}

.btn-primary.loading .btn-text {
    display: none;
}

.btn-primary.loading .btn-loader {
    display: inline-block;
}

/* ERROR */
.error-message {
    margin-top: 10px;
    color: #f87171;
    font-size: 0.8rem;
    display: none;
}

/* FOOTER */
.login-footer {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.75rem;
    opacity: 0.5;
}

/* BACKGROUND ORBS */
.gradient-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
}

.orb-1 {
    width: 200px;
    height: 200px;
    background: #6366f1;
    top: -50px;
    left: -50px;
}

.orb-2 {
    width: 250px;
    height: 250px;
    background: #ec4899;
    bottom: -50px;
    right: -50px;
}

.orb-3 {
    width: 150px;
    height: 150px;
    background: #22c55e;
    top: 50%;
    right: -60px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<div class="login-container">

```
<div class="login-card">

    <div class="login-header">
        <div class="logo-container">
            <svg class="logo-icon" viewBox="0 0 24 24">
                <path d="M20.57 14.86L22 13.43L20.57 12L17 15.57L8.43 7L12 3.43L10.57 2L9.14 3.43L7.71 2L5.57 4.14L4.14 2.71L2.71 4.14L4.14 5.57L2 7.71L3.43 9.14L2 10.57L3.43 12L7 8.43L15.57 17L12 20.57L13.43 22L14.86 20.57L16.29 22L18.43 19.86L19.86 21.29L21.29 19.86L19.86 18.43L22 16.29L20.57 14.86Z" fill="currentColor"/>
            </svg>

</div>

</div>

<script>
// TOGGLE PASSWORD
document.getElementById("togglePassword").addEventListener("click", () => {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
});

// LOGIN
const form = document.getElementById("loginForm");
const btn = document.getElementById("loginBtn");
const errorMsg = document.getElementById("errorMessage");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        showError("Email dan password wajib diisi!");
        return;
    }

    btn.classList.add("loading");

    setTimeout(() => {
        if (email === "admin@gymku.com" && password === "123456") {
            alert("Login berhasil!");
        } else {
            showError("Email atau password salah!");
        }
        btn.classList.remove("loading");
    }, 1200);
});

function showError(msg) {
    errorMsg.style.display = "block";
    errorMsg.innerText = msg;
}
</script>

</body>
</html>
